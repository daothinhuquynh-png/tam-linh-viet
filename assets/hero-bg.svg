    <path d="M1168,770 Q1200,722 1232,770" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M1155,770 Q1200,715 1245,770" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  </g>

  <!-- Chim Lạc bay -->
  <g opacity="0.06">
    <path d="M300,200 Q320,170 360,185 Q350,190 345,182" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M1250,180 Q1270,150 1310,165 Q1300,170 1295,162" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M600,120 Q615,100 640,108 Q633,112 630,106" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    <path d="M1000,150 Q1015,130 1040,138 Q1033,142 1030,136" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  </g>

  <!-- Núi xa mờ -->
  <g opacity="0.04">
    <polygon points="0,800 200,600 400,800" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <polygon points="300,800 550,580 800,800" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <polygon points="700,800 950,620 1200,800" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <polygon points="1100,800 1350,600 1600,800" fill="none" stroke="url(#gold)" stroke-width="2"/>
  </g>

  <!-- Sóng nước -->
  <g opacity="0.04">
    <path d="M0,850 Q100,835 200,850 Q300,865 400,850 Q500,835 600,850 Q700,865 800,850 Q900,835 1000,850 Q1100,865 1200,850 Q1300,835 1400,850 Q1500,865 1600,850" fill="none" stroke="url(#gold)" stroke-width="2"/>
