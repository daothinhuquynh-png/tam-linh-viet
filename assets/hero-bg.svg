<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#922B21"/>
      <stop offset="50%" style="stop-color:#6B1E1E"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D060"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Hoa văn trống đồng lớn trung tâm -->
  <circle cx="800" cy="450" r="300" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.08"/>
  <circle cx="800" cy="450" r="250" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.06"/>
  <circle cx="800" cy="450" r="200" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.05"/>
  <circle cx="800" cy="450" r="150" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.04"/>
  <circle cx="800" cy="450" r="100" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.04"/>
  <circle cx="800" cy="450" r="50" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.05"/>
  <circle cx="800" cy="450" r="20" fill="url(#gold)" opacity="0.06"/>

  <!-- Tia mặt trời trống đồng -->
  <g opacity="0.05" stroke="url(#gold)" stroke-width="2">
    <line x1="800" y1="400" x2="800" y2="350"/>
    <line x1="825" y1="403" x2="840" y2="355"/>
    <line x1="845" y1="415" x2="870" y2="375"/>
    <line x1="857" y1="433" x2="890" y2="405"/>
    <line x1="860" y1="450" x2="900" y2="450"/>
    <line x1="857" y1="467" x2="890" y2="495"/>
    <line x1="845" y1="485" x2="870" y2="525"/>
    <line x1="825" y1="497" x2="840" y2="545"/>
    <line x1="800" y1="500" x2="800" y2="550"/>
    <line x1="775" y1="497" x2="760" y2="545"/>
    <line x1="755" y1="485" x2="730" y2="525"/>
    <line x1="743" y1="467" x2="710" y2="495"/>
    <line x1="740" y1="450" x2="700" y2="450"/>
    <line x1="743" y1="433" x2="710" y2="405"/>
    <line x1="755" y1="415" x2="730" y2="375"/>
    <line x1="775" y1="403" x2="760" y2="355"/>
  </g>

  <!-- Mái đền bên trái -->
  <g opacity="0.06">
    <rect x="100" y="500" width="200" height="120" rx="3" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M70,500 Q200,430 330,500" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <path d="M90,430 Q200,380 310,430" fill="none" stroke="url(#gold)" stroke-width="2"/>
  </g>

  <!-- Mái chùa bên phải -->
  <g opacity="0.06">
    <rect x="1250" y="480" width="180" height="140" rx="3" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M1220,480 Q1340,410 1460,480" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <path d="M1240,410 Q1340,360 1440,410" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M1270,360 Q1340,320 1410,360" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  </g>

  <!-- Hoa sen trải dưới -->
  <g opacity="0.05">
    <ellipse cx="400" cy="750" rx="60" ry="25" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M365,750 Q400,700 435,750" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <path d="M350,750 Q400,690 450,750" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  </g>
  <g opacity="0.05">
