<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#922B21"/>
      <stop offset="100%" style="stop-color:#6B1E1E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D060"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Mái đền cong -->
  <rect x="140" y="120" width="120" height="70" rx="3" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M120,120 Q200,75 280,120" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <path d="M135,75 Q200,50 265,75" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- Cột -->
  <line x1="160" y1="120" x2="160" y2="190" stroke="url(#gold)" stroke-width="1.5"/>
  <line x1="240" y1="120" x2="240" y2="190" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Cửa -->
  <path d="M185,190 Q200,170 215,190" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- Bệ -->
  <rect x="130" y="190" width="140" height="8" rx="1" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Bậc thang -->
  <line x1="170" y1="205" x2="230" y2="205" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <line x1="165" y1="215" x2="235" y2="215" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- Hoa văn viền -->
  <circle cx="200" cy="250" r="20" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  <circle cx="200" cy="250" r="12" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.15"/>
</svg>