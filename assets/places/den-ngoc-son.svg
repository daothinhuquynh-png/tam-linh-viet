  <path d="M80,300 Q140,290 200,300 Q260,310 320,300 Q380,290 440,300 Q500,310 540,300" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <path d="M60,320 Q130,310 200,320 Q270,330 340,320 Q410,310 480,320 Q530,328 560,320" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  <!-- Cầu Thê Húc -->
  <path d="M160,260 Q230,240 300,255" fill="none" stroke="#C0392B" stroke-width="3" opacity="0.7"/>
  <line x1="180" y1="258" x2="180" y2="275" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <line x1="210" y1="250" x2="210" y2="270" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <line x1="240" y1="247" x2="240" y2="268" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <line x1="270" y1="249" x2="270" y2="270" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <!-- Đền Ngọc Sơn -->
  <rect x="300" y="170" width="100" height="80" rx="3" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M280,170 Q350,130 420,170" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <path d="M290,130 Q350,100 410,130" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <path d="M305,100 Q350,78 395,100" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Cửa đền -->
  <path d="M330,250 Q350,228 370,250" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <!-- Cột đền -->
  <line x1="315" y1="170" x2="315" y2="250" stroke="url(#gold)" stroke-width="1.5"/>
  <line x1="385" y1="170" x2="385" y2="250" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Tháp Bút -->
  <rect x="135" y="170" width="20" height="60" rx="1" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <polygon points="130,170 145,140 160,170" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <line x1="145" y1="140" x2="145" y2="125" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Mây -->
  <path d="M60,100 Q90,90 120,100 Q150,110 180,100" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  <path d="M420,80 Q450,70 480,80 Q510,90 540,80" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  <!-- Hoa sen -->
  <ellipse cx="480" cy="290" rx="20" ry="10" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <path d="M468,290 Q480,270 492,290" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <path d="M462,290 Q480,265 498,290" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
</svg>