<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D060"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Tháp chùa nhiều tầng -->
  <rect x="175" y="80" width="50" height="110" rx="2" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <rect x="170" y="78" width="60" height="8" rx="1" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <rect x="170" y="115" width="60" height="5" rx="1" fill="none" stroke="url(#gold)" stroke-width="1"/>
  <rect x="170" y="148" width="60" height="5" rx="1" fill="none" stroke="url(#gold)" stroke-width="1"/>
  <!-- Mái -->
  <polygon points="162,78 200,55 238,78" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <polygon points="172,55 200,40 228,55" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
