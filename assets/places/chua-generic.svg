  <ellipse cx="200" cy="220" rx="35" ry="15" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <path d="M180,220 Q200,190 220,220" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
