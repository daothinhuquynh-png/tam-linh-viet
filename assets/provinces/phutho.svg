  <line x1="200" y1="155" x2="200" y2="165" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="153" x2="185" y2="162" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="187" y1="145" x2="178" y2="150" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="187" y1="135" x2="178" y2="130" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="127" x2="185" y2="118" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="210" y1="153" x2="215" y2="162" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <!-- Núi Nghĩa Lĩnh -->
