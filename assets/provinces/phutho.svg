  <!-- Tia sáng -->
  <line x1="200" y1="125" x2="200" y2="115" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="210" y1="127" x2="215" y2="118" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <line x1="213" y1="135" x2="222" y2="130" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
