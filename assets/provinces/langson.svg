<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3E2723"/>
      <stop offset="100%" style="stop-color:#5D4037"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D060"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Núi đá Tam Thanh -->
  <polygon points="60,260 120,120 180,260" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  <polygon points="150,260 220,100 290,260" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.5"/>
  <polygon points="250,260 320,140 390,260" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.35"/>
  <!-- Cửa hang -->
  <path d="M195,260 Q220,230 245,260" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
  <!-- Chùa trong hang -->
  <rect x="210" y="242" width="20" height="15" rx="1" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <path d="M206,242 Q220,234 234,242" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <!-- Mây trên núi -->
  <path d="M30,150 Q55,140 80,150 Q105,160 130,150" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>
  <path d="M280,120 Q305,110 330,120 Q355,130 380,120" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>
  <!-- Hoa đào -->
  <circle cx="80" cy="200" r="4" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <circle cx="90" cy="195" r="3" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <circle cx="340" cy="190" r="4" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <circle cx="350" cy="185" r="3" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
</svg>