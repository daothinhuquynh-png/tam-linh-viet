<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#922B21"/>
      <stop offset="100%" style="stop-color:#5D1A14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0D060"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Hoa văn trống đồng -->
  <circle cx="200" cy="150" r="90" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="150" r="70" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.25"/>
  <circle cx="200" cy="150" r="50" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  <!-- Tháp Rùa giả cổ -->
  <rect x="180" y="120" width="40" height="50" rx="2" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <polygon points="170,120 200,95 230,120" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <polygon points="178,95 200,78 222,95" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Cầu Thê Húc -->
  <path d="M120,175 Q160,155 200,170 Q240,185 280,165" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.6"/>
  <!-- Sóng nước Hồ Gươm -->
  <path d="M80,200 Q120,190 160,200 Q200,210 240,200 Q280,190 320,200" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <path d="M60,215 Q100,205 140,215 Q180,225 220,215 Q260,205 300,215 Q340,225 360,215" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  <!-- Hoa sen -->
  <ellipse cx="320" cy="240" rx="18" ry="10" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <path d="M310,240 Q320,220 330,240" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <path d="M305,240 Q320,215 335,240" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
</svg>