<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập – Quản Trị Tâm Linh Việt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      position: relative;
      overflow: hidden;
    }
    /* Animated background */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(192,57,43,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(212,175,55,0.1) 0%, transparent 50%);
    }
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }
    .login-card {
      background: #1a1d27;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #922B21, #C0392B);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.8rem;
      box-shadow: 0 8px 24px rgba(192,57,43,0.4);
    }
    .brand h1 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .brand p {
      color: rgba(255,255,255,0.45);
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }
    .divider-line {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 1.5rem 0;
    }
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 1rem;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.2s;
      outline: none;
    }
    input:focus {
      border-color: #C0392B;
      background: rgba(192,57,43,0.06);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.15);
    }
    .toggle-pw {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: rgba(255,255,255,0.7); }
    .error-msg {
      display: none;
      background: rgba(192,57,43,0.15);
      border: 1px solid rgba(192,57,43,0.4);
      color: #e87070;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      align-items: center;
      gap: 0.5rem;
    }
    .error-msg.show { display: flex; }
    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #C0392B, #922B21);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(192,57,43,0.4);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login.loading { pointer-events: none; opacity: 0.7; }
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link a {
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      font-size: 0.82rem;
      transition: color 0.2s;
    }
    .back-link a:hover { color: rgba(255,255,255,0.6); }
    .security-note {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255,255,255,0.2);
      font-size: 0.72rem;
      justify-content: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">⛩️</div>
        <h1>Tâm Linh Việt</h1>
        <p>Hệ thống Quản Trị Nội Dung</p>
      </div>
      <div class="divider-line"></div>

      <div class="error-msg" id="errorMsg">
        <span>⚠️</span>
        <span id="errorText">Tên đăng nhập hoặc mật khẩu không đúng.</span>
      </div>

      <form id="loginForm" onsubmit="doLogin(event)">
        <div class="form-group">
          <label>Tên Đăng Nhập</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" placeholder="Nhập tên đăng nhập" autocomplete="username" required>
          </div>
        </div>
        <div class="form-group">
          <label>Mật Khẩu</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
            <button type="button" class="toggle-pw" onclick="togglePw()">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          Đăng Nhập Hệ Thống
        </button>
      </form>

      <div class="back-link">
        <a href="../index.html">← Quay về trang chính</a>
      </div>

      <div class="security-note">
        🔐 Phiên đăng nhập được mã hoá và bảo vệ
      </div>
    </div>
  </div>

  <script>
    // Kiểm tra nếu đã đăng nhập
    if (localStorage.getItem('tlv_admin_auth') === 'true') {
      window.location.href = 'index.html';
    }

    // Tài khoản quản trị (trong môi trường thực tế cần dùng backend)
    const ACCOUNTS = [
      { username: 'admin',    password: 'TamLinhViet@2026', role: 'super', name: 'Super Admin' },
      { username: 'quantri',  password: 'QuanTri@2026',     role: 'admin', name: 'Quản Trị Viên' },
      { username: 'thanhvien',password: 'ThanhVien@2026',   role: 'editor', name: 'Thành Viên' }
    ];

    function doLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      btn.classList.add('loading');
      btn.textContent = 'Đang xác thực...';

      setTimeout(() => {
        const account = ACCOUNTS.find(a => a.username === u && a.password === p);
        if (account) {
          localStorage.setItem('tlv_admin_auth', 'true');
          localStorage.setItem('tlv_admin_user', JSON.stringify({
            username: account.username,
            name: account.name,
            role: account.role
          }));
          window.location.href = 'index.html';
        } else {
          showError('Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng thử lại.');
          btn.classList.remove('loading');
          btn.textContent = 'Đăng Nhập Hệ Thống';
        }
      }, 800);
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
